<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kompendium PRM</title>
    <style>
        :root { --bg-color: #f4f6f9; --text-color: #333; --sidebar-bg: #ffffff; --accent-color: #e63946; --card-bg: #ffffff; --border-color: #ddd; }
        [data-theme="dark"] { --bg-color: #121212; --text-color: #e0e0e0; --sidebar-bg: #1e1e1e; --accent-color: #ff4d6d; --card-bg: #1e1e1e; --border-color: #333; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { display: flex; background: var(--bg-color); color: var(--text-color); min-height: 100vh; }
        nav { width: 280px; background: var(--sidebar-bg); border-right: 1px solid var(--border-color); padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .logo { font-size: 20px; font-weight: bold; color: var(--accent-color); }
        .search-box { width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; background: var(--bg-color); color: var(--text-color); }
        .menu-items { list-style: none; display: flex; flex-direction: column; gap: 8px; }
        .menu-items a { display: block; padding: 10px; color: var(--text-color); text-decoration: none; border-radius: 6px; }
        .menu-items a:hover { background: var(--accent-color); color: white; }
        main { flex: 1; padding: 40px; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .theme-btn { padding: 8px 16px; cursor: pointer; border-radius: 20px; border: 1px solid var(--border-color); background: var(--sidebar-bg); color: var(--text-color); }
        .categories-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-top: 20px; }
        .category-card { background: var(--card-bg); padding: 25px; border-radius: 12px; border: 1px solid var(--border-color); text-decoration: none; color: var(--text-color); font-weight: bold; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        @media (max-width: 768px) { body { flex-direction: column; } nav { width: 100%; } main { padding: 20px; } }
    </style>
</head>
<body>
    <nav>
        <div class="logo">🚑 Kompendium PRM</div>
        <input type="text" class="search-box" placeholder="Szukaj...">
        <ul class="menu-items">
            <li><a href="farmakologia.html">💊 Farmakologia</a></li>
            <li><a href="ekg.html">🫀 EKG</a></li>
            <li><a href="procedury.html">🛠️ Procedury</a></li>
        </ul>
    </nav>
    <main>
        <header>
            <h1>Panel Główny Ratownika</h1>
            <button class="theme-btn" onclick="toggleTheme()">🌓 Tryb Jasny/Ciemny</button>
        </header>
        <div class="categories-grid">
            <a href="farmakologia.html" class="category-card">💊<br><br>Farmakologia</a>
            <a href="ekg.html" class="category-card">🫀<br><br>EKG</a>
            <a href="procedury.html" class="category-card">🛠️<br><br>Procedury</a>
        </div>
    </main>
    <script>
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute("data-theme");
            const newTheme = currentTheme === "dark" ? "light" : "dark";
            document.documentElement.setAttribute("data-theme", newTheme);
        }
    </script>
</body>
</html>
